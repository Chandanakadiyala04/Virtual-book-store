<div class="cart-container">
  <h2>Your Shopping Cart</h2>
  
  <div class="cart-layout" *ngIf="items.length > 0">
    <div class="cart-items">
      <div class="cart-item" *ngFor="let item of items">
        <div class="item-info">
          <h3>{{item.title}}</h3>
          <p>Quantity: {{item.quantity}}</p>
        </div>
        <div class="item-actions">
          <span class="price">${{item.price * item.quantity}}</span>
          <button (click)="removeItem(item.bookId)"><i class="fas fa-trash"></i></button>
        </div>
      </div>
    </div>

    <div class="cart-summary">
      <h3>Order Summary</h3>
      <div class="summary-row">
        <span>Subtotal</span>
        <span>${{total}}</span>
      </div>
      <div class="summary-row">
        <span>Shipping</span>
        <span class="free">FREE</span>
      </div>
      <hr>
      <div class="summary-row total">
        <span>Total</span>
        <span>${{total}}</span>
      </div>
      <button class="btn-checkout" (click)="checkout()">Proceed to Checkout</button>
    </div>
  </div>

  <div class="empty-cart" *ngIf="items.length === 0">
    <img src="https://cdn-icons-png.flaticon.com/512/2038/2038854.png" alt="Empty Cart">
    <p>Your cart is empty.</p>
    <button routerLink="/">Start Shopping</button>
  </div>
</div>

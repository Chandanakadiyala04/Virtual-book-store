<div class="auth-wrapper">
  <div class="auth-card">
    <h2>Set New Password</h2>
    <p>Choose a strong password to secure your account.</p>

    <div class="error-msg" *ngIf="errorMessage && !isSubmitted">
      {{errorMessage}}
    </div>

    <form (ngSubmit)="onSubmit()" #f="ngForm" novalidate *ngIf="token && !isSubmitted">
      <div class="form-group">
        <label>New Password</label>
        <input type="password" name="newPassword" [(ngModel)]="newPassword" required minlength="6" #newPwd="ngModel" placeholder="••••••••">
      </div>

      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" name="confirmPassword" [(ngModel)]="confirmPassword" required minlength="6" #confirmPwd="ngModel" placeholder="••••••••">
      </div>
      
      <button type="submit" class="btn-primary" [disabled]="!f.form.valid || isLoading">
        {{isLoading ? 'Updating...' : 'Reset Password'}}
      </button>
    </form>

    <div class="success-msg" *ngIf="isSubmitted">
      Password reset successfully! Redirecting to login...
    </div>

    <div class="auth-footer">
      <a routerLink="/login">Back to Sign In</a>
    </div>
  </div>
</div>

<div class="auth-wrapper">
  <div class="auth-card">
    <h2>Reset Password</h2>
    <p>Enter your email to receive a password reset link.</p>

    <form (ngSubmit)="onSubmit()" #f="ngForm" novalidate *ngIf="!isSubmitted">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" [(ngModel)]="email" required email #emailInput="ngModel" placeholder="johndoe@example.com">
      </div>
      
      <button type="submit" class="btn-primary" [disabled]="!f.form.valid || isLoading">
        {{isLoading ? 'Sending...' : 'Send Reset Link'}}
      </button>
    </form>

    <div class="success-msg" *ngIf="isSubmitted">
      If an account exists with that email, a reset link has been sent. Please check your inbox.
    </div>

    <div class="auth-footer">
      Remembered your password? <a routerLink="/login">Sign In</a>
    </div>
  </div>
</div>

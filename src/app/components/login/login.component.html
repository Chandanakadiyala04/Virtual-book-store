<div class="auth-wrapper">
  <div class="auth-card">
    <h2>Welcome Back</h2>
    <p>Enter your details to continue your reading journey.</p>

    <form (ngSubmit)="onSubmit()" #f="ngForm" novalidate>
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" [(ngModel)]="form.username" required #username="ngModel" placeholder="Enter your username">
      </div>
      
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" [(ngModel)]="form.password" required minlength="6" #password="ngModel" placeholder="••••••••">
        <div class="forgot-password-link">
          <a routerLink="/forgot-password">Forgot password?</a>
        </div>
      </div>

      <button type="submit" class="btn-primary">Sign In</button>

      <div class="error-msg" *ngIf="isLoginFailed">
        {{errorMessage || 'Login failed. Please check your credentials.'}}
      </div>
    </form>

    <div class="divider">
      <span>Or continue with</span>
    </div>

    <div class="google-btn-container">
      <div id="google-btn"></div>
    </div>

    <div class="auth-footer">
      New here? <a routerLink="/register">Create an account</a>
    </div>
  </div>
</div>
